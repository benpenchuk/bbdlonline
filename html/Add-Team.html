<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add a new team to the Beta Beer Dye League">
  <meta name="keywords" content="beer dye, league, add team, registration">
  <meta name="author" content="Beta Beer Dye League">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Add New Team - Beta Beer Dye League</title>
  <link rel="stylesheet" href="../css/styles.css?v=1.0">
  <script defer src="../js/menu.js?v=1.0"></script>
  <script defer src="../js/form-handler.js?v=1.0"></script>
</head>
<body>

<div class="menu-btn">
  <span class="menu-btn__burger"></span>
</div>

<nav class="nav">
  <ul class="nav__list">
    <li class="nav__item"><a href="../index.html" class="nav__link">Home</a></li>
    <li class="nav__item"><a href="Add-Team.html" class="nav__link">Add Team</a></li>
    <li class="nav__item"><a href="PlayerBios.html" class="nav__link">Player Bios</a></li>
    <li class="nav__item"><a href="Contact.html" class="nav__link">Contact</a></li>
  </ul>
</nav>

<div class="first-part">
  <h1 class="logo-text">Add New Team</h1>
</div>

<div class="middle-part">
  <form action="#" method="POST" id="team-form">
    <label for="team-name">Team Name:</label>
    <input type="text" id="team-name" name="team-name" required>
    <br><br>

    <label for="player-1">Player 1:</label>
    <input type="text" id="player-1" name="player-1" required>
    <br><br>

    <label for="player-2">Player 2:</label>
    <input type="text" id="player-2" name="player-2" required>
    <br><br>

    <button type="submit">Submit Team</button>
  </form>
</div>

</body>
</html>
