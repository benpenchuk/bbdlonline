<head>
  <meta charset="UTF-8">

  <!-- Styles -->
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="stylesheet" href="../css/carousel.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/navigation.css">
  <link rel="stylesheet" href="../css/sponsors.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- Menu Button -->
<div class="menu-btn">
  <span class="menu-btn__burger"></span>
  <span class="menu-btn__burger"></span>
  <span class="menu-btn__burger"></span>
</div>

<!-- Navigation Menu -->
<nav class="nav">
  <ul class="nav__list">
    <li class="nav__item"><a href="Homepage.html" class="nav__link">Home</a></li>
    <li class="nav__item"><a href="Standings.html" class="nav__link">Standings</a></li>
    <li class="nav__item"><a href="Add-Team.html" class="nav__link">Add Team</a></li>
    <li class="nav__item"><a href="PlayerBios.html" class="nav__link">Player Bios</a></li>
    <li class="nav__item"><a href="Rulebook.html" class="nav__link">Rulebook</a></li>
    <li class="nav__item"><a href="Contact.html" class="nav__link">Contact</a></li>

</nav>

<!-- Page Header -->
<div class="first-part">
  <h1 class="logo-text">Add New Team</h1>
</div>

<!-- Add Team Form -->
<div class="add-team-form-container">
  <h2>Add New Team</h2>
  <form id="addTeamForm">
    <div class="form-group">
      <label for="teamName">Team Name</label>
      <input type="text" id="teamName" name="teamName" placeholder="Enter team name" required>
    </div>

    <div class="form-group">
      <label for="player1Name">Player 1 Name</label>
      <input type="text" id="player1Name" name="player1Name" placeholder="Enter Player 1 name" required>
    </div>

    <div class="form-group">
      <label for="player2Name">Player 2 Name</label>
      <input type="text" id="player2Name" name="player2Name" placeholder="Enter Player 2 name" required>
    </div>

    <div class="form-group">
      <label for="teamPhoto">Upload Team Photo</label>
      <input type="file" id="teamPhoto" name="teamPhoto" accept="image/*">
    </div>

    <button type="submit">Add Team</button>
  </form>
</div>

<!-- Scripts -->
<script defer src="../js/menu.js"></script>
<script defer src="../js/addTeam.js"></script> <!-- Handles form submission -->
</body>
</html>
